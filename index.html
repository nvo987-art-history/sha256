<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHA256 GENERATOR | NVO987</title>

<style>
body{
    margin:0;
    background:#050505;
    font-family:monospace;
    color:#0ff;
    text-align:center;
    overflow-x:hidden;
}

h1{
    margin-top:40px;
    font-size:28px;
    text-shadow:0 0 10px #0ff;
}

.info{
    margin-top:10px;
    font-size:13px;
    line-height:1.5;
}

textarea{
    width:85%;
    max-width:600px;
    height:120px;
    padding:14px;
    background:#000;
    border:1px solid #0ff;
    color:#0ff;
    margin-top:25px;
    outline:none;
    box-sizing:border-box;
}
textarea:focus{
    box-shadow:0 0 10px #0ff;
}

button{
    margin-top:15px;
    padding:12px 25px;
    background:#0ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
button:hover{
    box-shadow:0 0 15px #0ff;
}

.file-btn{
    margin-top:15px;
}

#result{
    margin:30px auto;
    width:85%;
    max-width:700px;
    padding:20px;
    border:1px solid #0ff;
    background:#000;
    box-shadow:0 0 10px #0ff;
    box-sizing:border-box;
}

.ok{ color:#00ff88; }
.err{ color:#ff0040; }

footer{
    margin-top:60px;
    margin-bottom:30px;
    font-size:12px;
    color:#0ff;
    opacity:0.7;
}
</style>
</head>

<body>

<h1>SHA256 GENERATOR</h1>

<div class="info">
INPUT: Text or File<br>
FEATURES: real SHA256 hash, download bundle<br>
NOTE: local processing only — no upload, no tracking
</div>

<textarea id="text" placeholder="Enter text (optional)"></textarea>

<br>

<input type="file" id="file" hidden>
<button class="file-btn" onclick="document.getElementById('file').click()">
SELECT FILE
</button>

<div id="filename" style="margin-top:8px;font-size:12px;"></div>

<br>
<button onclick="generate()">GENERATE</button>

<div id="result"></div>

<footer>
NVO987<br>
Nicholas Van-Orton<br>
© 2026<br>
did:web:identity.nvo987.us
</footer>

<script>

let currentHash = "";
let currentText = "";
let currentFileName = "data.txt";

/* FILE NAME SHOW */
document.getElementById("file").addEventListener("change", e=>{
    document.getElementById("filename").innerText =
        e.target.files[0]?.name || "";
});

/* SHA256 */
async function sha256(text){
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2,"0")).join("");
}

/* GENERATE */
async function generate(){

    const text = document.getElementById("text").value;
    const file = document.getElementById("file").files[0];
    const result = document.getElementById("result");

    let content = "";

    if(file){
        content = await file.text();
        currentFileName = file.name;
    }else if(text){
        content = text;
        currentFileName = "text.txt";
    }else{
        result.innerHTML = "<div class='err'>No input provided</div>";
        return;
    }

    const hash = await sha256(content);

    currentHash = hash;
    currentText = content;

    result.innerHTML = `
        <div class="ok">✔ SHA256 generated</div>
        <div style="background:#111;padding:12px;margin-top:10px;word-break:break-all;">
            ${hash}
        </div>
        <button onclick="copyHash()">COPY HASH</button>
        <button onclick="downloadFile()">DOWNLOAD</button>
    `;
}

/* COPY */
function copyHash(){
    navigator.clipboard.writeText(currentHash);
}

/* DOWNLOAD FIX */
function downloadFile(){

    const data = {
        sha256: currentHash,
        content: currentText
    };

    const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        {type: "application/json"}
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "sha256_bundle.json";
    a.click();

    URL.revokeObjectURL(a.href);
}

</script>

</body>
</html>
